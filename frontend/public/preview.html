<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nos Univers - Luxe</title>
    <style>
        /* Vos styles existants... */
        
        .nos-univers__image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Style luxueux pour les cartes */
        .nos-univers__card {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .nos-univers__card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 30px 60px rgba(0,0,0,0.25);
        }

        .nos-univers__media::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to top,
                rgba(0,0,0,0.7) 0%,
                rgba(0,0,0,0.2) 40%,
                transparent 70%
            );
            pointer-events: none;
        }

        .nos-univers__title {
            position: absolute;
            bottom: 1.5rem;
            left: 1.5rem;
            z-index: 1;
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
            margin: 0;
            letter-spacing: 0.05em;
        }

        /* Badge "Nouveau" pour la dernière carte */
        .badge-new {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: #C9A96E;
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            z-index: 2;
        }
    </style>
</head>
<body>
    <section class="nos-univers">
        <div class="nos-univers__container">
            <h2 class="nos-univers__heading" style="font-size: 2.5rem; font-weight: 300; letter-spacing: 0.1em; margin-bottom: 2rem;">
                Nos Univers
            </h2>
            <div class="nos-univers__grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; max-width: 1200px; margin: 0 auto; padding: 0 1rem;">
                
                <!-- 🏡 Maison -->
                <a class="nos-univers__card" href="#">
                    <div class="nos-univers__media" style="position: relative; aspect-ratio: 4/3;">
                        <img class="nos-univers__image" 
                             src="https://images.unsplash.com/photo-1618220179428-22790b461013?w=800&h=600&fit=crop" 
                             alt="Maison" 
                             loading="lazy">
                        <p class="nos-univers__title">🏡 Maison</p>
                    </div>
                </a>

                <!-- 💄 Beauté -->
                <a class="nos-univers__card" href="#">
                    <div class="nos-univers__media" style="position: relative; aspect-ratio: 4/3;">
                        <img class="nos-univers__image" 
                             src="https://images.unsplash.com/photo-1596462502278-27bfdc403348?w=800&h=600&fit=crop" 
                             alt="Beauté" 
                             loading="lazy">
                        <p class="nos-univers__title">💄 Beauté</p>
                    </div>
                </a>

                <!-- 👜 Accessoires -->
                <a class="nos-univers__card" href="#">
                    <div class="nos-univers__media" style="position: relative; aspect-ratio: 4/3;">
                        <img class="nos-univers__image" 
                             src="https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=800&h=600&fit=crop" 
                             alt="Accessoires" 
                             loading="lazy">
                        <p class="nos-univers__title">👜 Accessoires</p>
                    </div>
                </a>

                <!-- 🏃 Sport -->
                <a class="nos-univers__card" href="#">
                    <div class="nos-univers__media" style="position: relative; aspect-ratio: 4/3;">
                        <img class="nos-univers__image" 
                             src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=800&h=600&fit=crop" 
                             alt="Sport" 
                             loading="lazy">
                        <p class="nos-univers__title">🏃 Sport</p>
                    </div>
                </a>

                <!-- 💻 Électronique -->
                <a class="nos-univers__card" href="#">
                    <div class="nos-univers__media" style="position: relative; aspect-ratio: 4/3;">
                        <img class="nos-univers__image" 
                             src="https://images.unsplash.com/photo-1498049794561-7780e7231661?w=800&h=600&fit=crop" 
                             alt="Électronique" 
                             loading="lazy">
                        <p class="nos-univers__title">💻 Électronique</p>
                    </div>
                </a>

                <!-- ✨ Nouveautés (avec badge spécial) -->
                <a class="nos-univers__card" href="#">
                    <div class="nos-univers__media" style="position: relative; aspect-ratio: 4/3;">
                        <img class="nos-univers__image" 
                             src="https://images.unsplash.com/photo-1600267204091-5c1ab8b10c02?w=800&h=600&fit=crop" 
                             alt="Nouveautés" 
                             loading="lazy">
                        <div class="badge-new">✨ Nouveau</div>
                        <p class="nos-univers__title">✨ Nouveautés</p>
                    </div>
                </a>

            </div>
        </div>
    </section>
</body>
</html>
